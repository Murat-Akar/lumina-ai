<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Lumina AI — Your Generated Listing Images</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Geist:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "surface-container-high": "#2a2a2c", "surface": "#131315",
          "surface-container-low": "#1c1b1d", "surface-container-lowest": "#0e0e10",
          "surface-container": "#201f21", "primary": "#b8c3ff",
          "background": "#131315", "surface-bright": "#39393b",
          "on-surface": "#e5e1e4", "on-primary": "#002388",
          "primary-container": "#2e5bff", "surface-container-highest": "#353437",
          "on-surface-variant": "#c4c5d9", "on-primary-container": "#efefff",
          "outline-variant": "#434656", "error": "#ffb4ab", "outline": "#8e90a2"
        },
        borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
        fontFamily: { "headline-lg": ["Manrope"], "headline-xl": ["Manrope"], "label-caps": ["Geist"], "body-md": ["Geist"], "body-sm": ["Geist"], "label-md": ["Geist"] },
        fontSize: {
          "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
          "headline-xl": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
          "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
          "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
          "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
          "label-md": ["14px", {"lineHeight": "20px", "fontWeight": "500"}]
        }
      }
    }
  }
</script>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  .glass-panel { background: rgba(32,31,33,0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.06); }

  /* Result card */
  .result-card { transition: transform 0.2s ease, box-shadow 0.2s ease; }
  .result-card:hover { transform: translateY(-2px); }

  /* Placeholder gradient backgrounds - different per card index */
  .placeholder-0 { background: linear-gradient(135deg, #1a1f3a 0%, #0d1230 40%, #1a2a4a 100%); }
  .placeholder-1 { background: linear-gradient(135deg, #1a2a1a 0%, #0d2010 40%, #1a3a2a 100%); }
  .placeholder-2 { background: linear-gradient(135deg, #2a1a2a 0%, #200d30 40%, #2a1a3a 100%); }
  .placeholder-3 { background: linear-gradient(135deg, #2a1f0d 0%, #201510 40%, #3a2a1a 100%); }
  .placeholder-4 { background: linear-gradient(135deg, #0d1f2a 0%, #0d1820 40%, #1a2a3a 100%); }
  .placeholder-5 { background: linear-gradient(135deg, #2a0d1a 0%, #200d18 40%, #3a1a2a 100%); }
  .placeholder-6 { background: linear-gradient(135deg, #1a2a0d 0%, #162010 40%, #2a3a1a 100%); }
  .placeholder-7 { background: linear-gradient(135deg, #2a1a0d 0%, #1e1408 40%, #3a2a1a 100%); }

  /* Loading overlay */
  .card-loading-overlay {
    position: absolute; inset: 0;
    background: rgba(13,14,16,0.85);
    backdrop-filter: blur(4px);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px;
    z-index: 10;
    border-radius: inherit;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner-ring {
    width: 48px; height: 48px;
    border-radius: 50%;
    border: 3px solid rgba(184,195,255,0.15);
    border-top-color: #b8c3ff;
    animation: spin 0.8s linear infinite;
  }

  /* Success flash */
  @keyframes success-flash {
    0% { opacity: 0; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1.05); }
    100% { opacity: 0; transform: scale(1.2); }
  }
  .success-flash {
    animation: success-flash 0.6s ease-out forwards;
  }

  /* Toast */
  .toast {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
    padding: 12px 24px; border-radius: 12px;
    font-family: 'Geist', sans-serif; font-size: 14px; font-weight: 500;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    z-index: 100; transition: all 0.3s ease;
    background: #201f21; color: #e5e1e4; border: 1px solid rgba(255,255,255,0.08);
  }
</style>
<script src="auth.js"></script>
<script src="config.js"></script>
</head>
<body class="bg-background text-on-surface font-body-md min-h-screen">

<!-- Top Nav -->
<header class="sticky top-0 z-50 flex justify-between items-center px-6 py-3 w-full bg-surface/80 backdrop-blur-xl border-b border-outline-variant/30 shadow-sm">
  <div class="flex items-center gap-6">
    <a href="index.html" class="font-headline-lg text-xl font-bold text-primary tracking-tight">Lumina AI</a>
    <div class="hidden md:flex items-center gap-2 px-3 py-1.5 bg-green-500/10 border border-green-500/20 rounded-full">
      <span class="w-2 h-2 bg-green-400 rounded-full"></span>
      <span class="font-label-caps text-label-caps text-green-400">Generation Complete</span>
    </div>
  </div>
  <div class="flex items-center gap-3">
    <button onclick="startNewSession()" class="flex items-center gap-2 px-5 py-2 rounded-xl border border-outline-variant text-on-surface-variant hover:text-on-surface hover:border-primary/40 transition-all font-label-md text-sm">
      <span class="material-symbols-outlined text-[16px]">add_circle</span>New Session
    </button>
    <button onclick="downloadAll()" class="flex items-center gap-2 px-5 py-2 rounded-xl bg-primary-container text-on-primary-container font-label-md text-sm font-bold hover:brightness-110 active:scale-95 transition-all">
      <span class="material-symbols-outlined text-[16px]">download</span>Download All
    </button>
  </div>
</header>

<!-- Page Header -->
<div class="max-w-[1440px] mx-auto px-6 md:px-10 py-8">
  <div class="flex flex-col md:flex-row md:items-end justify-between gap-4 mb-8">
    <div>
      <h1 class="font-headline-xl text-[32px] md:text-[40px] font-bold text-on-surface mb-2">Generated Listing Images</h1>
      <p class="font-body-md text-on-surface-variant">
        <span id="result-summary">Generating results...</span>
      </p>
    </div>
    <div class="flex items-center gap-3">
      <!-- View toggle (decorative) -->
      <div class="flex gap-1 p-1 bg-surface-container rounded-lg border border-outline-variant/30">
        <button id="grid-view-btn" onclick="setView('grid')" class="p-2 bg-surface-bright text-primary rounded-md">
          <span class="material-symbols-outlined text-[18px]">grid_view</span>
        </button>
        <button id="list-view-btn" onclick="setView('list')" class="p-2 text-on-surface-variant hover:text-on-surface transition-colors rounded-md">
          <span class="material-symbols-outlined text-[18px]">view_agenda</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Results Grid -->
  <div id="results-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>

  <!-- Empty state fallback -->
  <div id="empty-state" class="hidden text-center py-24">
    <span class="material-symbols-outlined text-6xl text-on-surface-variant/20 block mb-4">image_not_supported</span>
    <p class="font-body-md text-on-surface-variant">No results found. <a href="wizard-step1.html" class="text-primary hover:underline">Start a new session</a></p>
  </div>

  <!-- Bottom Actions -->
  <div class="mt-12 flex flex-col sm:flex-row items-center justify-center gap-4 pt-8 border-t border-outline-variant/20">
    <button onclick="startNewSession()" class="flex items-center gap-2 px-8 py-4 rounded-xl border border-outline-variant text-on-surface-variant hover:text-on-surface hover:border-primary/50 transition-all font-label-md">
      <span class="material-symbols-outlined">restart_alt</span>Start New Session
    </button>
    <button onclick="downloadAll()" class="flex items-center gap-2 px-8 py-4 rounded-xl bg-primary-container text-on-primary-container font-label-md font-bold hover:brightness-110 active:scale-95 transition-all shadow-lg shadow-primary/15">
      <span class="material-symbols-outlined">download</span>Download All Images
    </button>
  </div>
</div>

<script>
  luminaCheckAuth();

  const BACKEND_URL = (typeof LUMINA_CONFIG !== 'undefined') ? LUMINA_CONFIG.backendUrl : '';

  // Fetch results from backend (images are too large for sessionStorage)
  async function loadResults() {
    if (BACKEND_URL) {
      try {
        const jobId = sessionStorage.getItem('lumina_jobId');
        // Try specific jobId first, then fall back to latest completed job
        const url = jobId
          ? `${BACKEND_URL}/status/${jobId}`
          : `${BACKEND_URL}/latest-job`;
        const resp = await fetch(url);
        if (resp.ok) {
          const job = await resp.json();
          if (job.images && job.images.length) {
            // Save jobId so retry can reference it
            if (job.jobId) sessionStorage.setItem('lumina_jobId', job.jobId);
            return job.images;
          }
        }
      } catch(e) { /* fall through */ }
    }
    // Fallback: legacy sessionStorage path
    try { return JSON.parse(sessionStorage.getItem('lumina_results') || '[]'); } catch(e) { return []; }
  }

  let results = [];
  const imageCount = parseInt(sessionStorage.getItem('lumina_image_count') || '1');

  // Per-card history
  const cardHistory = {};
  let currentView = 'grid';

  const placeholderClasses = ['placeholder-0','placeholder-1','placeholder-2','placeholder-3','placeholder-4','placeholder-5','placeholder-6','placeholder-7'];
  const placeholderIcons = ['auto_awesome','star','flash_on','diamond','bolt','sparkles','emoji_objects','interests'];

  function initCards(resultData) {
    const count = Math.max(imageCount, resultData.length, 1);
    const cards = Array.from({length: count}, (_, i) => ({
      id: i, label: `Generated Image #${i + 1}`, historyIndex: 0, retryCount: 0, isLoading: false,
      slot: resultData[i] ? resultData[i].slot : (i + 1)
    }));
    cards.forEach((c, i) => {
      const result = resultData[i] || null;
      cardHistory[c.id] = [{
        src:      result ? result.data     : null,
        filename: result ? result.filename : `generated_image_${i + 1}.png`,
        label:    'Version 1',
        ts:       new Date().toLocaleTimeString()
      }];
    });
    document.getElementById('result-summary').textContent =
      `${count} image${count !== 1 ? 's' : ''} generated • Session completed`;
    return cards;
  }

  // Cards initialized async after fetching from backend
  let cards = initCards([]);

  // --- Render ---
  function render() {
    const grid = document.getElementById('results-grid');

    if (cards.length === 0) {
      grid.innerHTML = '';
      document.getElementById('empty-state').classList.remove('hidden');
      return;
    }

    const colClass = currentView === 'list'
      ? 'col-span-full'
      : '';

    grid.innerHTML = cards.map(card => {
      const history = cardHistory[card.id];
      const current = history[card.historyIndex];
      const hasPrev = card.historyIndex < history.length - 1;
      const hasNext = card.historyIndex > 0;
      const phClass = placeholderClasses[card.id % placeholderClasses.length];
      const phIcon = placeholderIcons[card.id % placeholderIcons.length];
      const maxRetries = 3;
      const retriesLeft = maxRetries - card.retryCount;

      return `
        <div class="result-card ${colClass} bg-surface-container rounded-2xl overflow-hidden border border-outline-variant/20 shadow-xl relative flex flex-col" id="card-${card.id}">
          ${card.isLoading ? `
          <div class="card-loading-overlay">
            <div class="spinner-ring"></div>
            <p class="font-label-md text-on-surface-variant text-sm">Regenerating...</p>
          </div>` : ''}

          <!-- Image Area -->
          <div class="relative aspect-square overflow-hidden ${currentView === 'list' ? 'h-48' : ''}">
            ${current.src
              ? `<img src="${current.src}" alt="${card.label}" class="w-full h-full object-cover"/>`
              : `<div class="w-full h-full ${phClass} flex flex-col items-center justify-center gap-3 relative">
                  <div class="absolute inset-0 opacity-30" style="background: radial-gradient(circle at 50% 50%, rgba(184,195,255,0.15) 0%, transparent 70%);"></div>
                  <span class="material-symbols-outlined text-5xl text-primary/60 relative z-10" style="font-variation-settings: 'FILL' 1;">${phIcon}</span>
                  <div class="text-center relative z-10">
                    <p class="font-label-caps text-label-caps text-primary/70">AI GENERATED</p>
                    <p class="font-body-sm text-on-surface-variant/50 mt-1">Image #${card.id + 1}</p>
                  </div>
                  <div class="absolute bottom-3 right-3 px-2 py-0.5 rounded-full bg-surface-container-lowest/60 backdrop-blur-sm border border-outline-variant/20">
                    <p class="font-label-caps text-[9px] text-on-surface-variant/50">${current.label} • ${current.ts}</p>
                  </div>
                </div>`
            }

            <!-- Card number badge -->
            <div class="absolute top-3 left-3 px-2.5 py-1 rounded-full bg-surface-container-lowest/80 backdrop-blur-sm border border-outline-variant/30">
              <span class="font-label-caps text-[10px] text-primary">#${card.id + 1}</span>
            </div>

            <!-- Download button (hover) -->
            <div class="absolute top-3 right-3">
              <button onclick="downloadImage(${card.id})" title="Download"
                class="w-8 h-8 rounded-full bg-surface-container-lowest/80 backdrop-blur-sm flex items-center justify-center text-on-surface-variant hover:text-primary hover:bg-surface-container transition-colors border border-outline-variant/20">
                <span class="material-symbols-outlined text-[16px]">download</span>
              </button>
            </div>
          </div>

          <!-- Card Footer -->
          <div class="p-4 flex flex-col gap-3">
            <div class="flex items-center justify-between">
              <p class="font-label-md font-bold text-on-surface truncate">${card.label}</p>
              <span class="font-label-caps text-[10px] text-on-surface-variant/50 shrink-0">${current.ts}</span>
            </div>

            <!-- Version indicator -->
            <div class="flex items-center gap-1">
              ${history.map((_, hi) => `
                <div class="h-1 rounded-full transition-all ${hi === card.historyIndex ? 'w-6 bg-primary' : 'w-2 bg-outline-variant/40 hover:bg-outline-variant cursor-pointer'}"
                  onclick="jumpToVersion(${card.id}, ${hi})" title="Version ${history.length - hi}"></div>
              `).join('')}
            </div>

            <!-- Action Buttons -->
            <div class="flex items-center gap-2 pt-1">
              <!-- History Back (show previous version) -->
              <button onclick="showPrevVersion(${card.id})" title="Previous version" ${!hasPrev ? 'disabled' : ''}
                class="flex items-center gap-1 px-3 py-2 rounded-lg font-label-caps text-[11px] border transition-all
                  ${hasPrev
                    ? 'border-outline-variant text-on-surface-variant hover:border-primary/40 hover:text-primary active:scale-95'
                    : 'border-outline-variant/20 text-on-surface-variant/20 cursor-not-allowed'}">
                <span class="material-symbols-outlined text-[14px]">arrow_back</span>
                Prev
              </button>

              <!-- History Forward (show newer version) -->
              <button onclick="showNextVersion(${card.id})" title="Newer version" ${!hasNext ? 'disabled' : ''}
                class="flex items-center gap-1 px-3 py-2 rounded-lg font-label-caps text-[11px] border transition-all
                  ${hasNext
                    ? 'border-outline-variant text-on-surface-variant hover:border-primary/40 hover:text-primary active:scale-95'
                    : 'border-outline-variant/20 text-on-surface-variant/20 cursor-not-allowed'}">
                <span class="material-symbols-outlined text-[14px]">arrow_forward</span>
                Next
              </button>

              <!-- Retry -->
              <button onclick="retryCard(${card.id})" title="Regenerate (${retriesLeft} left)" ${retriesLeft <= 0 || card.isLoading ? 'disabled' : ''}
                class="flex-1 flex items-center justify-center gap-1.5 px-3 py-2 rounded-lg font-label-caps text-[11px] transition-all
                  ${retriesLeft > 0 && !card.isLoading
                    ? 'bg-primary/10 text-primary border border-primary/20 hover:bg-primary/20 active:scale-95'
                    : 'bg-surface-container-lowest text-on-surface-variant/30 border border-outline-variant/10 cursor-not-allowed'}">
                <span class="material-symbols-outlined text-[14px]">autorenew</span>
                Retry ${retriesLeft > 0 ? `(${retriesLeft})` : '(used)'}
              </button>
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  // --- Actions ---
  // --- Retry with feedback ---
  let retryTargetId = null;

  function retryCard(id) {
    const card = cards[id];
    if (card.retryCount >= 3 || card.isLoading) return;
    retryTargetId = id;
    document.getElementById('retry-num').textContent = id + 1;
    document.getElementById('retry-feedback').value = '';
    document.getElementById('retry-modal').style.display = 'flex';
    setTimeout(() => document.getElementById('retry-feedback').focus(), 50);
  }

  function cancelRetry() {
    document.getElementById('retry-modal').style.display = 'none';
    retryTargetId = null;
  }

  async function submitRetry() {
    if (retryTargetId === null) return;
    const id       = retryTargetId;
    const feedback = document.getElementById('retry-feedback').value.trim();
    const card     = cards[id];
    cancelRetry();

    card.isLoading = true;
    render();

    const jobId = sessionStorage.getItem('lumina_jobId');
    try {
      const resp = await fetch(`${BACKEND_URL}/retry-slot`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ jobId, slot: card.slot, feedback }),
      });
      const data = await resp.json();
      if (!resp.ok) throw new Error(data.error || `Server ${resp.status}`);

      card.isLoading = false;
      card.retryCount++;
      const history = cardHistory[id];
      history.unshift({
        src:      data.imageData,
        filename: data.filename || `generated_image_${id + 1}.png`,
        label:    `Version ${history.length + 1}`,
        ts:       new Date().toLocaleTimeString(),
      });
      card.historyIndex = 0;
      render();
      showToast(`Image #${id + 1} regenerated`, 'success');
    } catch (err) {
      card.isLoading = false;
      render();
      showToast('Retry failed: ' + err.message, 'error');
    }
  }

  // Modal event listeners are set via onclick/onkeydown attributes in the HTML below

  function showPrevVersion(id) {
    const card = cards[id];
    if (card.historyIndex < cardHistory[id].length - 1) {
      card.historyIndex++;
      render();
    }
  }

  function showNextVersion(id) {
    const card = cards[id];
    if (card.historyIndex > 0) {
      card.historyIndex--;
      render();
    }
  }

  function jumpToVersion(id, historyIndex) {
    cards[id].historyIndex = historyIndex;
    render();
  }

  function downloadImage(id) {
    const current = cardHistory[id][cards[id].historyIndex];
    if (!current.src) { showToast('No image to download yet', 'info'); return; }
    const a = document.createElement('a');
    a.href = current.src;
    a.download = current.filename || `generated_image_${id + 1}.png`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    showToast(`Downloading Image #${id + 1}`, 'success');
  }

  function downloadAll() {
    const available = cards.filter(c => cardHistory[c.id][c.historyIndex].src);
    if (!available.length) { showToast('No images to download', 'info'); return; }
    available.forEach((card, i) => {
      setTimeout(() => downloadImage(card.id), i * 350);
    });
    showToast(`Downloading ${available.length} image${available.length !== 1 ? 's' : ''}...`, 'success');
  }

  function startNewSession() {
    if (confirm('Start a new session? Your current results will remain accessible via browser history.')) {
      sessionStorage.removeItem('lumina_product_photos');
      sessionStorage.removeItem('lumina_description');
      sessionStorage.removeItem('lumina_competitor_images');
      sessionStorage.removeItem('lumina_image_count');
      window.location.href = 'wizard-step1.html';
    }
  }

  function setView(view) {
    currentView = view;
    const gridBtn = document.getElementById('grid-view-btn');
    const listBtn = document.getElementById('list-view-btn');
    if (view === 'grid') {
      gridBtn.classList.add('bg-surface-bright', 'text-primary');
      gridBtn.classList.remove('text-on-surface-variant');
      listBtn.classList.remove('bg-surface-bright', 'text-primary');
      listBtn.classList.add('text-on-surface-variant');
    } else {
      listBtn.classList.add('bg-surface-bright', 'text-primary');
      listBtn.classList.remove('text-on-surface-variant');
      gridBtn.classList.remove('bg-surface-bright', 'text-primary');
      gridBtn.classList.add('text-on-surface-variant');
    }
    render();
  }

  function showToast(msg, type = 'info') {
    const existing = document.querySelector('.toast');
    if (existing) existing.remove();

    const toast = document.createElement('div');
    toast.className = 'toast';
    if (type === 'success') {
      toast.style.background = 'rgba(21, 128, 61, 0.3)';
      toast.style.borderColor = 'rgba(74, 222, 128, 0.3)';
      toast.style.color = '#86efac';
    } else if (type === 'error') {
      toast.style.background = 'rgba(127, 29, 29, 0.3)';
      toast.style.borderColor = 'rgba(252, 165, 165, 0.3)';
      toast.style.color = '#fca5a5';
    }
    toast.innerHTML = `<span class="material-symbols-outlined text-[16px] align-middle mr-2" style="font-variation-settings: 'FILL' 1;">${type === 'success' ? 'check_circle' : type === 'error' ? 'error' : 'info'}</span>${msg}`;
    document.body.appendChild(toast);
    setTimeout(() => {
      toast.style.opacity = '0';
      toast.style.transform = 'translateX(-50%) translateY(8px)';
      setTimeout(() => toast.remove(), 300);
    }, 3000);
  }

  // Load images from backend then render
  loadResults().then(data => {
    results = data;
    cards = initCards(results);
    render();
  });

  render(); // initial render with placeholders while loading
</script>

<!-- Retry with feedback modal -->
<div id="retry-modal" onclick="if(event.target===this)cancelRetry()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:300;align-items:center;justify-content:center;padding:1rem;">
  <div style="background:#1c1b1d;border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:2rem;width:100%;max-width:480px;box-shadow:0 24px 64px rgba(0,0,0,0.6);">
    <h3 style="font-family:Manrope,sans-serif;font-size:20px;font-weight:700;color:#e5e1e4;margin-bottom:.5rem;">
      Retry Image #<span id="retry-num"></span>
    </h3>
    <p style="font-size:14px;color:#c4c5d9;margin-bottom:1.25rem;">
      Describe what to change — or leave empty to generate a fresh variation.
    </p>
    <textarea id="retry-feedback" rows="4"
      placeholder="e.g. Make the background white and minimal. Remove all text labels."
      onkeydown="if(event.key==='Enter'&&(event.ctrlKey||event.metaKey))submitRetry()"
      style="width:100%;background:#131315;border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:.875rem;color:#e5e1e4;font-family:Geist,sans-serif;font-size:14px;resize:vertical;outline:none;box-sizing:border-box;"></textarea>
    <p style="font-size:11px;color:#8e90a2;margin-top:.5rem;margin-bottom:1.5rem;">Ctrl+Enter to submit</p>
    <div style="display:flex;gap:.75rem;justify-content:flex-end;">
      <button onclick="cancelRetry()"
        style="padding:.75rem 1.5rem;border:1px solid rgba(255,255,255,0.1);border-radius:10px;background:transparent;color:#c4c5d9;font-family:Geist,sans-serif;font-size:14px;font-weight:600;cursor:pointer;">
        Cancel
      </button>
      <button onclick="submitRetry()"
        style="padding:.75rem 1.5rem;border:none;border-radius:10px;background:#2e5bff;color:#fff;font-family:Geist,sans-serif;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:.5rem;">
        <span style="font-family:'Material Symbols Outlined';font-size:18px;font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24;">auto_awesome</span>
        Generate
      </button>
    </div>
  </div>
</div>
</body>
</html>
